<div class="card w-full max-w-md shadow-2xl bg-base-100">
  <div class="card-body">
    <h2 class="text-2xl font-bold text-center mb-1">Crear Cuenta</h2>
    <p class="text-center text-base-content/60 mb-6 text-sm">
      Únete a Cinema Management
    </p>

    @if (hasError()) {
      <div class="alert alert-error text-sm mb-4 py-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    @if (successMessage()) {
      <div class="alert alert-success text-sm mb-4 py-2 text-white">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <span>{{ successMessage() }}</span>
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="form-control">
        <label class="label pt-0 pb-1">
          <span class="label-text font-medium">Nombre completo</span>
        </label>
        <input
          type="text"
          placeholder="Ej. Juan Pérez"
          class="input input-bordered w-full"
          formControlName="nombre"
          [class.input-error]="
            registerForm.get('nombre')?.invalid &&
            registerForm.get('nombre')?.touched
          "
        />
      </div>

      <div class="form-control">
        <label class="label pb-1">
          <span class="label-text font-medium">Correo Electrónico</span>
        </label>
        <input
          type="email"
          placeholder="ejemplo@correo.com"
          class="input input-bordered w-full"
          formControlName="email"
          [class.input-error]="
            registerForm.get('email')?.invalid &&
            registerForm.get('email')?.touched
          "
        />
      </div>

      <div class="form-control">
        <label class="label pb-1">
          <span class="label-text font-medium">Contraseña</span>
        </label>
        <input
          type="password"
          placeholder="Mínimo 5 caracteres"
          class="input input-bordered w-full"
          formControlName="password"
          [class.input-error]="
            registerForm.get('password')?.invalid &&
            registerForm.get('password')?.touched
          "
        />
      </div>

      <div class="form-control mt-6">
        <button
          type="submit"
          class="btn btn-primary w-full"
          [disabled]="isPosting() || registerForm.invalid"
        >
          @if (isPosting()) {
            <span class="loading loading-spinner"></span> Registrando...
          } @else {
            Registrarse
          }
        </button>
      </div>
    </form>

    <div class="divider text-sm my-2">O</div>

    <div class="text-center">
      <span class="text-base-content/70 text-sm">¿Ya tienes una cuenta? </span>
      <a routerLink="/auth/login" class="link link-primary font-medium text-sm"
        >Inicia sesión</a
      >
    </div>
  </div>
</div>
