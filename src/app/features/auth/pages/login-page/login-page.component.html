<div class="card w-full max-w-md shadow-2xl bg-base-100">
  <div class="card-body">
    <h2 class="text-2xl font-bold text-center mb-1">Iniciar Sesión</h2>
    <p class="text-center text-base-content/60 mb-6 text-sm">
      Bienvenido de nuevo a Cinema Management
    </p>

    @if (hasError()) {
      <div class="alert alert-error text-sm mb-4 py-2 text-white">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="form-control">
        <label class="label pt-0 pb-1">
          <span class="label-text font-medium">Correo Electrónico</span>
        </label>
        <label
          class="input input-bordered flex items-center gap-2"
          [class.input-error]="
            loginForm.get('email')?.invalid && loginForm.get('email')?.touched
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
            class="h-4 w-4 opacity-70"
          >
            <path
              d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793c.026.009.051.02.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185A.755.755 0 0 1 15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z"
            />
            <path
              d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z"
            />
          </svg>
          <input
            type="email"
            class="grow"
            placeholder="ejemplo@correo.com"
            formControlName="email"
          />
        </label>
      </div>

      <div class="form-control">
        <label class="label pb-1">
          <span class="label-text font-medium">Contraseña</span>
        </label>
        <label
          class="input input-bordered flex items-center gap-2"
          [class.input-error]="
            loginForm.get('password')?.invalid &&
            loginForm.get('password')?.touched
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
            class="h-4 w-4 opacity-70"
          >
            <path
              fill-rule="evenodd"
              d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
              clip-rule="evenodd"
            />
          </svg>
          <input
            type="password"
            class="grow"
            placeholder="Tu contraseña"
            formControlName="password"
          />
        </label>
      </div>

      <div class="form-control mt-6">
        <button
          type="submit"
          class="btn btn-primary w-full"
          [disabled]="isPosting() || loginForm.invalid"
        >
          @if (isPosting()) {
            <span class="loading loading-spinner"></span> Iniciando...
          } @else {
            Login
          }
        </button>
      </div>
    </form>

    <div class="divider text-sm my-2">O</div>

    <div class="text-center">
      <span class="text-base-content/70 text-sm">¿No tienes cuenta? </span>
      <a
        routerLink="/auth/register"
        class="link link-primary font-medium text-sm"
        >Crea una Aquí!</a
      >
    </div>
  </div>
</div>
