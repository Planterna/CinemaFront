@if (isModalOpen()) {
  <app-modal-global
    [tipo]="tipoModal()!"
    [titulo]="tituloModal()!"
    [modulo]="'ROOM'"
    [descripcion]="descripcionModal()!"
    (onClose)="cerrarModal()"
  >
  </app-modal-global>
}
<div class="min-h-screen flex items-center justify-center bg-base-200 p-4">
  <div
    class="w-full max-w-md bg-base-100 shadow-2xl rounded-2xl overflow-hidden border border-base-300"
  >
    <div class="p-8">
      <h2 class="text-3xl font-bold text-center text-base-content mb-2">
        Editar Sala
      </h2>
      <p class="text-base-content/60 text-center mb-6">
        Modifica los detalles de la sala seleccionada
      </p>

      <form
        class="flex flex-col gap-4"
        [formGroup]="roomForm"
        (ngSubmit)="onSubmit()"
      >
        <div class="form-control">
          <label class="label">
            <span class="label-text text-base-content/80 font-medium"
              >Nombre de la Sala</span
            >
          </label>
          <input
            type="text"
            placeholder="Ej: Sala 3D - A"
            class="input input-bordered w-full focus:outline-none focus:border-primary"
            formControlName="nombre"
          />
          @if (
            roomForm.get("nombre")?.invalid && roomForm.get("nombre")?.touched
          ) {
            <span class="text-error text-xs mt-1">El nombre es requerido</span>
          }
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text text-base-content/80 font-medium"
              >Estado</span
            >
          </label>
          <select
            class="select select-bordered w-full focus:outline-none focus:border-primary"
            formControlName="estado"
          >
            <option disabled>Seleccione un estado</option>
            @for (item of dataSelected; track $index) {
              <option
                [value]="item"
              >
                {{ item }}
              </option>
            }
          </select>
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text text-base-content/80 font-medium"
              >URL de Imagen</span
            >
          </label>
          <input
            type="text"
            placeholder="https://...jpg"
            class="input input-bordered w-full focus:outline-none focus:border-primary"
            formControlName="imagen_url"
          />
        </div>

        <div
          class="form-control bg-base-200/70 p-3 rounded-lg border border-base-300"
        >
          <label class="cursor-pointer label justify-between">
            <span class="label-text text-base-content/80 font-medium"
              >Disponible</span
            >
            <input
              type="checkbox"
              class="checkbox checkbox-primary checkbox-md"
              formControlName="activo"
            />
          </label>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mt-6">
          <button
            type="button"
            routerLink="/admin/room"
            class="btn btn-ghost flex-1 order-2 sm:order-1"
          >
            Cancelar
          </button>

          <button
            class="btn btn-primary flex-1 order-1 sm:order-2 shadow-lg shadow-primary/30"
            type="submit"
            [disabled]="roomForm.invalid"
          >
            Guardar Cambios
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
