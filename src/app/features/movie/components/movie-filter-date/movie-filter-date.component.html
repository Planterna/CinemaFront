<div class="flex flex-col mx-2">
  <div>
    <label class="label text-center">
      <span class="label-text text-base-content/80"
        >Fecha Publicacion - Fecha Fin</span
      >
    </label>
  </div>
  <div class="flex flex-row form-control w-full">
    <input #fecha_publicacion type="date" class="input select-bordered" />
    <input #fecha_fin type="date" class="input select-bordered" />
    <button
      class="btn join-item rounded-r-full btn-primary"
      (click)="action.emit([fecha_publicacion.value, fecha_fin.value])"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        fill="currentColor"
        class="bi bi-search"
        viewBox="0 0 16 16"
      >
        <path
          d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"
        />
      </svg>
    </button>
  </div>
</div>
