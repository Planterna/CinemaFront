<div
  class="overflow-x-auto w-full rounded-xl border border-base-300 bg-base-100 shadow-sm"
>
  <table class="table w-full whitespace-nowrap">
    <thead
      class="bg-base-200/50 text-base-content/70 text-xs uppercase tracking-wider"
    >
      <tr>
        <th class="font-semibold">#</th>
        <th class="font-semibold">Película</th>
        <th class="font-semibold">Duración</th>
        <th class="font-semibold">Estado</th>
        <th class="font-semibold">Acciones</th>
      </tr>
    </thead>

    <tbody>
      @for (movie of movies() || []; track $index) {
        <tr class="hover:bg-base-200/50 transition-colors duration-200">
          <td class="text-base-content/60 font-medium">
            {{ $index + 1 }}
          </td>
          <td>
            <div class="flex items-center gap-4">
              <div class="avatar shadow-sm">
                <div class="w-10 h-14 rounded bg-base-200 ring-1 ring-base-300">
                  <img
                    [src]="movie.imagen_url"
                    alt="Póster"
                    class="object-cover"
                  />
                </div>
              </div>
              <div>
                <div class="font-bold text-base">{{ movie.nombre }}</div>
              </div>
            </div>
          </td>
          <td>
            <div
              class="flex items-center gap-1.5 text-base-content/80 text-sm font-medium"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 opacity-60"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              {{ movie.duracion }} min
            </div>
          </td>
          <td>
            <span
              class="badge badge-sm font-medium border-none"
              [class]="
                movie.activo
                  ? 'bg-success/20 text-success'
                  : 'bg-error/20 text-error'
              "
            >
              {{ movie.activo ? "Activo" : "Inactivo" }}
            </span>
          </td>
          <td>
            <div class="flex items-center gap-2">
              <button
                (click)="edit.emit(movie)"
                class="btn btn-ghost btn-xs text-primary hover:bg-primary/20"
              >
                Editar
              </button>
              <button (click)="delete.emit(movie)" class="btn btn-ghost btn-xs text-error hover:bg-error/20">
                Eliminar
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <td colspan="5">
          <no-data [titulo]="'peliculas'"></no-data>
        </td>
      }
    </tbody>
  </table>
</div>
