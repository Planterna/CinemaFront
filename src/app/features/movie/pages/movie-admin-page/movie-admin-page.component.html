@if (isModalOpen()) {
  <app-modal-global
    [tipo]="tipoModal()!"
    [titulo]="tituloModal()!"
    [modulo]="'MOVIE'"
    [descripcion]="descripcionModal()!"
    (onClose)="cerrarModal()"
    (onAccept)="deletedMovie()"
  >
  </app-modal-global>
}

<div class="container mx-auto px-4 py-2">
  <div class="mb-3 text-center md:text-left">
    <h2 class="text-2xl md:text-4xl font-bold text-base-content">
      Peliculas Disponibles
      <span class="ml-1 badge badge-accent badge-lg font-extrabold">
        {{ movieResource.value()?.length }}
      </span>
    </h2>
    <p class="text-base-content/60 mt-2 text-sm md:text-base">
      Administra la peliculas disponibles.
    </p>
  </div>
  <div class="flex items-center justify-between w-full">
    <div>
      <h2>implements</h2>
      <!-- <movie-search (action)="searchMovie($event)"></movie-search> -->
    </div>

    <div>
      <button
        class="btn btn-primary border my-2 "
        [routerLink]="['/admin/movie/new']"
      >
        Add
      </button>
    </div>
  </div>
<div>
  <app-movie-table [movies]="movieResource.value()!" (edit)="editMovie($event)" (delete)="abrirModalEliminar($event)">
  </app-movie-table>
</div>
