@if (isModalOpen()) {
  <app-modal-global
    [tipo]="tipoModal()!"
    [titulo]="tituloModal()!"
    [modulo]="'MOVIE'"
    [descripcion]="descripcionModal()!"
    (onClose)="cerrarModal()"
  >
  </app-modal-global>
}

<div class="min-h-screen flex items-center justify-center bg-base-200 p-4">
  <div
    class="w-full max-w-md bg-base-100 shadow-2xl rounded-2xl overflow-hidden border border-base-300"
  >
    <div class="p-8">
      <div class="text-center mb-6">
        <h2 class="text-3xl font-bold text-base-content">Editar Película</h2>
        <p class="text-base-content/60 text-sm mt-1">
          Actualiza la información del catálogo
        </p>
      </div>

      <form
        class="flex flex-col gap-5"
        [formGroup]="movieForm"
        (ngSubmit)="onSubmit()"
      >
        <div class="form-control">
          <label class="label">
            <span class="label-text text-base-content/80 font-medium"
              >Título de la Película</span
            >
          </label>
          <input
            type="text"
            placeholder="Ej: Inception"
            class="input input-bordered w-full focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
            formControlName="nombre"
            [value]="movieResource.value()?.nombre"
          />
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text text-base-content/80 font-medium"
              >Duración (minutos)</span
            >
          </label>
          <input
            type="number"
            min="1"
            placeholder="Ej: 120"
            class="input input-bordered w-full focus:outline-none focus:border-primary"
            formControlName="duracion"
            [value]="movieResource.value()?.duracion"
          />
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text text-base-content/80 font-medium"
              >URL de Imagen</span
            >
          </label>
          <input
            type="text"
            placeholder="https://...jpg"
            class="input input-bordered w-full focus:outline-none focus:border-primary"
            formControlName="imagen_url"
            [value]="movieResource.value()?.imagen_url"
          />
        </div>

        <div
          class="form-control bg-base-200/70 p-3 rounded-lg border border-base-300"
        >
          <label class="cursor-pointer label justify-between">
            <span class="label-text text-base-content/80 font-medium"
              >Disponible en Cartelera</span
            >
            <input
              type="checkbox"
              class="checkbox checkbox-primary checkbox-md"
              formControlName="activo"
              [checked]="movieResource.value()?.activo"
            />
          </label>
        </div>

        <div
          class="flex flex-col sm:flex-row gap-3 mt-4 pt-4 border-t border-base-300"
        >
          <button
            type="button"
            routerLink="/admin/movie"
            class="btn btn-ghost flex-1 order-2 sm:order-1"
          >
            Cancelar
          </button>

          <button
            class="btn btn-primary flex-1 order-1 sm:order-2 shadow-lg shadow-primary/20"
            type="submit"
            [disabled]="movieForm.invalid"
          >
            Guardar Cambios
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
