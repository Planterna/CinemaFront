<div
  class="flex h-screen bg-base-200 text-base-content antialiased overflow-hidden selection:bg-primary selection:text-primary-content font-montserrat"
>
  <div
    class="fixed inset-0 z-40 bg-base-300/60 backdrop-blur-sm transition-opacity lg:hidden"
    [class.hidden]="!isSidebarOpen()"
    (click)="toggleSidebar()"
  ></div>

  <div
    class="absolute lg:static inset-y-0 left-0 z-50 w-64 bg-base-100 overflow-y-auto transition-transform duration-300 transform lg:translate-x-0 border-r border-base-300 shadow-2xl flex flex-col shrink-0"
    [class.-translate-x-full]="!isSidebarOpen()"
    [class.translate-x-0]="isSidebarOpen()"
  >
    <div
      class="flex items-center justify-between h-20 px-8 border-b border-base-300 shrink-0"
    >
      <div class="flex flex-col">
        <h1
          routerLink="/"
          class="text-xl md:text-2xl font-bold text-base-content font-montserrat cursor-pointer tracking-wide"
        >
          Cinema<span class="text-primary">|Mgt</span>
        </h1>
        <p class="text-base-content/60 text-xs mt-1">Manage activities</p>
      </div>
      <button
        (click)="toggleSidebar()"
        class="lg:hidden text-base-content/60 hover:text-base-content transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="px-6 py-6 border-b border-base-300 bg-base-200/70 shrink-0">
      <p
        class="text-base-content/60 text-xs uppercase font-semibold mb-3 tracking-wider"
      >
        Bienvenido
      </p>
      <a href="#" class="flex items-center gap-3 group">
        <div class="avatar placeholder">
          <div class="bg-neutral text-neutral-content w-24 rounded-full">
            <span class="text-3xl">A</span>
          </div>
        </div>
        <div class="flex flex-col">
          <span
            class="text-sm font-bold text-base-content group-hover:text-primary transition-colors"
            >{{ currentUser() ? currentUser().nombre : "Admin" }}</span
          >
          <span class="text-xs text-base-content/60">Administrador</span>
        </div>
      </a>
    </div>

    <nav class="mt-6 px-4 pb-6 flex-1 flex flex-col">
      <div class="flex flex-col gap-2">
        <a
          routerLink="/admin/dashboard"
          routerLinkActive="bg-primary text-primary-content shadow-lg shadow-primary/20"
          (click)="toggleSidebar()"
          class="flex items-center space-x-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-base-200 text-base-content/70 hover:text-base-content"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"
            />
          </svg>
          <span class="font-medium">Dashboard</span>
        </a>

        <a
          routerLink="/admin/movie"
          routerLinkActive="bg-primary text-primary-content shadow-lg shadow-primary/20"
          (click)="toggleSidebar()"
          class="flex items-center space-x-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-base-200 text-base-content/70 hover:text-base-content"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 shrink-0"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M0 1a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1zm4 0v6h8V1zm8 8H4v6h8zM1 1v2h2V1zm2 3H1v2h2zM1 7v2h2V7zm2 3H1v2h2zm-2 3v2h2v-2zM15 1h-2v2h2zm-2 3v2h2V4zm2 3h-2v2h2zm-2 3v2h2v-2zm2 3h-2v2h2z"
            />
          </svg>
          <span class="font-medium">Películas</span>
        </a>

        <a
          routerLink="/admin/room"
          routerLinkActive="bg-primary text-primary-content shadow-lg shadow-primary/20"
          (click)="toggleSidebar()"
          class="flex items-center space-x-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-base-200 text-base-content/70 hover:text-base-content"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>
          <span class="font-medium">Salas</span>
        </a>

        <a
          routerLink="/admin/assignment"
          routerLinkActive="bg-primary text-primary-content shadow-lg shadow-primary/20"
          (click)="toggleSidebar()"
          class="flex items-center space-x-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-base-200 text-base-content/70 hover:text-base-content"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 shrink-0"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h4a.5.5 0 1 0 0-1h-4a.5.5 0 0 1-.5-.5V7.207l5-5 6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293z"
            />
            <path
              d="M16 12.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0m-3.5-2a.5.5 0 0 0-.5.5v1h-1a.5.5 0 0 0 0 1h1v1a.5.5 0 1 0 1 0v-1h1a.5.5 0 1 0 0-1h-1v-1a.5.5 0 0 0-.5-.5"
            />
          </svg>
          <span class="font-medium">Asignaciones</span>
        </a>
      </div>

      <div class="mt-auto flex flex-col gap-2 pt-6 border-t border-base-300/80">
        <div
          class="flex items-center justify-between px-4 py-3 w-full rounded-xl hover:bg-base-200 transition-all text-base-content/70"
        >
          <label class="flex cursor-pointer gap-2 items-center">
            <span class="font-medium text-xs">Dark</span>

            <input
              type="checkbox"
              value="cupcake"
              class="toggle theme-controller toggle-sm toggle-primary"
            />

            <span class="font-medium text-xs">Cupcake</span>
          </label>
        </div>

        <a
          (click)="logout(); toggleSidebar()"
          class="flex items-center space-x-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-error/10 text-base-content/70 hover:text-error cursor-pointer group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 shrink-0 group-hover:text-red-500"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M3 2a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v13h1.5a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1H3zm1 13h8V2H4z"
            />
            <path d="M9 9a1 1 0 1 0 2 0 1 1 0 0 0-2 0" />
          </svg>
          <span class="font-medium">Cerrar Sesión</span>
        </a>

        <a
          routerLink="/cinema"
          (click)="toggleSidebar()"
          class="flex items-center space-x-3 w-full px-4 py-3 rounded-xl transition-all hover:bg-base-200 text-base-content/70 hover:text-base-content cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 shrink-0"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M1.5 1.5A.5.5 0 0 0 1 2v4.8a2.5 2.5 0 0 0 2.5 2.5h9.793l-3.347 3.346a.5.5 0 0 0 .708.708l4.2-4.2a.5.5 0 0 0 0-.708l-4-4a.5.5 0 0 0-.708.708L13.293 8.3H3.5A1.5 1.5 0 0 1 2 6.8V2a.5.5 0 0 0-.5-.5"
            />
          </svg>
          <span class="font-medium">Ir Al Inicio</span>
        </a>
      </div>
    </nav>
  </div>

  <div class="flex-1 flex flex-col h-full overflow-hidden relative">
    <div
      class="lg:hidden flex items-center bg-base-100 border-b border-base-300 h-16 px-4 shadow-sm z-30 shrink-0"
    >
      <button
        (click)="toggleSidebar()"
        class="text-base-content focus:outline-none mr-4"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
      <span class="font-bold text-lg text-base-content">Cinema Management</span>
    </div>

    <main
      class="flex-1 overflow-x-hidden overflow-y-auto bg-base-200 p-4 sm:p-6 md:p-8"
    >
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
